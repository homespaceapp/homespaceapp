name: Supabase DB Migrate

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Run migrations
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGSSLMODE: require
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "→ $f"
            psql \
              -h aws-0-eu-north-1.pooler.supabase.com \
              -p 6543 \
              -U "postgres.qlqnrsxpmoeoukfgovmy" \
              -d postgres \
              -f "$f"
          done
          echo "✅ Migracje wykonane"
