name: Supabase DB Migrate

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run migrations
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          for file in $(ls supabase/migrations/*.sql 2>/dev/null | sort); do
            echo "Running: $file"
            psql "$DB_URL" -f "$file"
          done
          echo "All migrations done."
